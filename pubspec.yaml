name: petpal
description: A cozy pixel-art virtual pet companion app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.3.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.3
  supabase_flutter: ^2.15.0
  pixelarticons: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/backgrounds/
    - assets/branding/
    - assets/room_items/
    - assets/pets/nuonuo/nuonuo_idle.png
    - assets/pets/nuonuo/nuonuo_walk.png
    - assets/pets/nuonuo/nuonuo_sleep.png
    - assets/pets/nuonuo/nuonuo_eat.png
    - assets/pets/nuonuo/nuonuo_happy.png
    - assets/pets/nuonuo/nuonuo_attentive.png
  fonts:
    - family: PixelifySans
      fonts:
        - asset: assets/fonts/PixelifySans.ttf
